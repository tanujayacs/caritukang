<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Caritukang</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 bg-light p-3">
                <div class="text-center">
                    <div class="rounded-circle bg-secondary text-white d-inline-block" style="width: 80px; height: 80px; line-height: 80px; font-size: 30px;">
                        BC
                    </div>
                    <h5 class="mt-3">Bessie Cooper</h5>
                    <button class="btn btn-warning btn-sm">Edit</button>
                </div>
                <hr>
                <nav class="nav flex-column">
                    <a href="#" class="nav-link text-dark">Dashboard</a>
                    <a href="#" class="nav-link text-dark">Notifikasi</a>
                    <a href="#" class="nav-link text-dark">Hadiah</a>
                    <a href="#" class="nav-link text-dark">Settings</a>
                </nav>
            </div>

            <!-- Main Content -->
            <div class="col-md-9 bg-light p-4">
                <h4>Hi, Bessie Cooper</h4>
                <p>dengan jumlah booking kelipatan 10, dapatkan penawaran menarik</p>

                <div class="row">
                    <!-- Booking Tukang -->
                    <div class="col-md-6 mb-3">
                        <div class="card border-primary">
                            <div class="card-body">
                                <h5 class="card-title">Booking Tukang</h5>
                                <p class="card-text"><strong>12</strong> tukang telah membantu</p>
                                <ul>
                                    <li>Desain Interior</li>
                                    <li>Tukang Cat</li>
                                    <li>Renovasi Bangunan</li>
                                </ul>
                                <button class="btn btn-link p-0">Lihat lebih banyak</button>
                            </div>
                        </div>
                    </div>

                    <!-- Ulasan Saya -->
                    <div class="col-md-6 mb-3">
                        <div class="card border-primary">
                            <div class="card-body">
                                <h5 class="card-title">Ulasan Saya</h5>
                                <p class="card-text">
                                    <span class="text-warning">&#9733;&#9733;&#9733;&#9733;&#9734;</span>  
                                    Merasa Puas dengan hasil pekerjaan...
                                </p>
                                <button class="btn btn-link p-0">Lihat ulasan saya</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Button Booking -->
                <div class="text-center mt-3">
                    <button class="btn btn-warning btn-lg">Booking Tukang Lagi!</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
